<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Beyond Health Early Access</title><style>body{margin:0;background:#030303;color:white;font-family:Inter,Arial,sans-serif}.nav{display:flex;align-items:center;justify-content:space-between;padding:22px 24px;border-bottom:1px solid #191919}.brand{display:flex;gap:14px;align-items:center;font-weight:900}.logo{width:52px;height:52px;border:4px solid #ff122b;border-radius:50%;display:grid;place-items:center;box-shadow:0 0 25px #ff122b}.btn{background:linear-gradient(135deg,#ff2735,#c90012);color:#fff;border:0;border-radius:999px;padding:16px 24px;font-weight:900}.hero{padding:90px 28px}.card{max-width:760px;margin:auto;background:radial-gradient(circle at 10% 10%,#7d0010,#14090b 60%);border:1px solid #5a252b;border-radius:42px;padding:56px;box-shadow:0 25px 80px rgba(255,0,30,.16)}.pill{display:inline-block;border:1px solid #7b454c;border-radius:999px;padding:12px 24px;background:rgba(255,255,255,.05);font-weight:800}h1{font-size:clamp(42px,8vw,74px);line-height:.95;margin:34px 0 24px}.muted{color:#c8bec1;font-size:clamp(20px,4vw,28px);line-height:1.45}.form{display:grid;gap:16px;margin-top:34px}input{background:#120c0d;border:1px solid #514046;color:white;border-radius:999px;padding:20px 24px;font-size:20px}#msg{font-weight:800;min-height:24px}footer{border-top:1px solid #191919;padding:32px 28px;color:#aaa}.ok{color:#7CFF9B}.bad{color:#ff8d8d}@media(max-width:560px){.card{padding:36px 26px;border-radius:34px}.nav{padding:18px 20px}.btn{padding:14px 20px}}</style></head><body><nav class="nav"><div class="brand"><div class="logo">♡</div><span>Beyond Health</span></div><a href="#early" class="btn">Early Access</a></nav><section class="hero" id="early"><div class="card"><span class="pill">🍁 Built in Canada</span><h1>Join the Beyond Health early access list.</h1><p class="muted">Be first to see product updates, UI previews, and beta launch news.</p><form class="form" id="signup"><input name="email" type="email" placeholder="Email address" required><input type="hidden" name="product" value="Beyond Health"><input type="hidden" name="source" value="beyond-health-landing"><button class="btn" type="submit">Join Early Access</button><div id="msg"></div></form></div></section><footer><strong>Beyond Health</strong><br>A Beyond Imagination Technology product.<br><br>Built in Canada 🇨🇦 · July Red Edition</footer><script>document.getElementById('signup').addEventListener('submit',async e=>{e.preventDefault();const msg=document.getElementById('msg');msg.textContent='Joining...';msg.className='';try{const res=await fetch('api/subscribe.php',{method:'POST',body:new FormData(e.target)});const data=await res.json();msg.textContent=data.message||'Done.';msg.className=data.ok?'ok':'bad';if(data.ok)e.target.reset();}catch(err){msg.textContent='Connection error. Please try again.';msg.className='bad';}});</script></body></html>
